services:
  clubbix:
    build:
      context: .
      dockerfile: Dockerfile
    image: clubbix:local
    container_name: clubbix
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      ENVIRONMENT: production
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      DB_PATH: /app/clubbix.db
      APPMAX_TOKEN: ${APPMAX_TOKEN:-}
      APPMAX_ORDER_URL: ${APPMAX_ORDER_URL:-https://api.appmax.com.br/api/v3/order}
    volumes:
      - ./backend/clubbix.db:/app/clubbix.db
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - clubbix-network

networks:
  clubbix-network:
    driver: bridge
